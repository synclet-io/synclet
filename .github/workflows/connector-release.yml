name: Connector Release

on:
  push:
    tags:
      - 'source-google-sheets-v*'
      - 'destination-google-sheets-v*'

permissions:
  contents: read
  packages: write

jobs:
  build-connector:
    runs-on: ubuntu-latest
    steps:
      - name: Determine connector from tag
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          CONNECTOR_NAME="${TAG%-v*}"
          VERSION="${TAG##*-v}"
          echo "CONNECTOR_NAME=${CONNECTOR_NAME}" >> "$GITHUB_ENV"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"

      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/${{ env.CONNECTOR_NAME }}
          tags: |
            type=semver,pattern={{version}},value=${{ env.VERSION }}
            type=raw,value=latest

      - name: Build and push connector image
        uses: docker/build-push-action@v6
        with:
          context: connectors/${{ env.CONNECTOR_NAME }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Update connector registry
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.REGISTRY_DISPATCH_TOKEN }}
          repository: synclet/synclet-connector-registry
          event-type: connector-released
          client-payload: |
            {
              "connector": "${{ env.CONNECTOR_NAME }}",
              "version": "${{ env.VERSION }}",
              "image": "ghcr.io/${{ github.repository }}/${{ env.CONNECTOR_NAME }}"
            }
