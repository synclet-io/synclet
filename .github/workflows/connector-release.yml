name: Connector Release

on:
  push:
    tags:
      - '*-v*'

permissions:
  contents: read
  packages: write

jobs:
  build-connector:
    runs-on: ubuntu-latest
    outputs:
      connector-name: ${{ env.CONNECTOR_NAME }}
      version: ${{ env.VERSION }}
    steps:
      - name: Determine connector from tag
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          CONNECTOR_NAME="${TAG%-v*}"
          VERSION="${TAG##*-v}"
          echo "CONNECTOR_NAME=${CONNECTOR_NAME}" >> "$GITHUB_ENV"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"

      - uses: actions/checkout@v4

      - name: Validate connector exists
        run: |
          if [ ! -d "connectors/${{ env.CONNECTOR_NAME }}" ]; then
            echo "::error::Connector directory connectors/${{ env.CONNECTOR_NAME }} not found"
            exit 1
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/${{ env.CONNECTOR_NAME }}
          tags: |
            type=semver,pattern={{version}},value=${{ env.VERSION }}
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push connector image
        uses: docker/build-push-action@v6
        with:
          context: connectors/${{ env.CONNECTOR_NAME }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=connector-${{ env.CONNECTOR_NAME }}
          cache-to: type=gha,mode=max,scope=connector-${{ env.CONNECTOR_NAME }}

  update-registry:
    needs: build-connector
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: synclet-io

      - name: Update connector registry
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ steps.app-token.outputs.token }}
          repository: synclet-io/synclet-connector-registry
          event-type: connector-released
          client-payload: |
            {
              "connector": "${{ needs.build-connector.outputs.connector-name }}",
              "version": "${{ needs.build-connector.outputs.version }}",
              "image": "ghcr.io/${{ github.repository }}/${{ needs.build-connector.outputs.connector-name }}"
            }
