name: Connector Release

on:
  push:
    tags:
      - 'source-*-v*'
      - 'destination-*-v*'

permissions:
  contents: read
  packages: write

jobs:
  build-connector:
    runs-on: ubuntu-latest
    outputs:
      connector-name: ${{ steps.tag.outputs.connector-name }}
      version: ${{ steps.tag.outputs.version }}
      metadata: ${{ steps.connector-meta.outputs.json }}
      spec: ${{ steps.spec.outputs.json }}
    steps:
      - name: Determine connector from tag
        id: tag
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          CONNECTOR_NAME="${TAG%-v*}"
          VERSION="${TAG##*-v}"
          echo "connector-name=${CONNECTOR_NAME}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "CONNECTOR_NAME=${CONNECTOR_NAME}" >> "$GITHUB_ENV"

      - uses: actions/checkout@v4

      - name: Validate connector exists
        run: |
          if [ ! -d "connectors/${{ env.CONNECTOR_NAME }}" ]; then
            echo "::error::Connector directory connectors/${{ env.CONNECTOR_NAME }} not found"
            exit 1
          fi

      - name: Read connector metadata
        id: connector-meta
        run: |
          META_FILE="connectors/${{ env.CONNECTOR_NAME }}/meta.json"
          if [ ! -f "$META_FILE" ]; then
            echo "::error::meta.json not found at $META_FILE"
            exit 1
          fi
          echo "json=$(jq -c . "$META_FILE")" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/${{ env.CONNECTOR_NAME }}
          tags: |
            type=semver,pattern={{version}},value=${{ steps.tag.outputs.version }}
            type=raw,value=latest

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push connector image
        uses: docker/build-push-action@v6
        with:
          context: connectors/${{ env.CONNECTOR_NAME }}
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=connector-${{ env.CONNECTOR_NAME }}
          cache-to: type=gha,mode=max,scope=connector-${{ env.CONNECTOR_NAME }}

      - name: Extract spec from connector image
        id: spec
        run: |
          IMAGE="ghcr.io/${{ github.repository }}/${{ env.CONNECTOR_NAME }}:${{ steps.tag.outputs.version }}"
          docker pull "$IMAGE"
          SPEC_OUTPUT=$(docker run --rm --network none "$IMAGE" spec 2>/dev/null || echo '{}')
          SPEC_JSON=$(echo "$SPEC_OUTPUT" | jq -c 'select(.type == "SPEC") | .spec // empty' 2>/dev/null || echo '')
          if [ -z "$SPEC_JSON" ]; then
            echo "::warning::Could not extract spec from connector, using null"
            SPEC_JSON='null'
          fi
          echo "json=$SPEC_JSON" >> "$GITHUB_OUTPUT"

  update-registry:
    needs: build-connector
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: synclet-io

      - name: Update connector registry
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ steps.app-token.outputs.token }}
          repository: synclet-io/synclet-connector-registry
          event-type: connector-released
          client-payload: |
            {
              "connector": "${{ needs.build-connector.outputs.connector-name }}",
              "version": "${{ needs.build-connector.outputs.version }}",
              "image": "ghcr.io/${{ github.repository }}/${{ needs.build-connector.outputs.connector-name }}",
              "metadata": ${{ needs.build-connector.outputs.metadata }},
              "spec": ${{ needs.build-connector.outputs.spec }}
            }
