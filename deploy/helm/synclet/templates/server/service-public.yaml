apiVersion: v1
kind: Service
metadata:
  name: {{ include "synclet.fullname" . }}
  labels:
    {{- include "synclet.server.labels" . | nindent 4 }}
spec:
  type: {{ .Values.server.service.type }}
  ports:
    - port: {{ .Values.server.service.ports.public }}
      targetPort: public
      protocol: TCP
      name: http
  selector:
    {{- include "synclet.server.selectorLabels" . | nindent 4 }}
