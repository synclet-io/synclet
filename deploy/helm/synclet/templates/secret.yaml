{{/*
Suppress the chart-managed secret entirely when VSO manages all secrets
(app secrets + database), or when all secrets use existingSecret.
*/}}
{{- $needsAuthSecret := and (not .Values.auth.existingSecret) (not .Values.vso.enabled) -}}
{{- $needsEncryptionSecret := and (not .Values.encryption.existingSecret) (not .Values.vso.enabled) -}}
{{- $needsInternalApiSecret := and (not .Values.internalApi.existingSecret) (not .Values.vso.enabled) -}}
{{- $needsPostgresSecret := and .Values.postgresql.enabled (not .Values.postgresql.auth.existingSecret) -}}
{{- $needsDbDsn := and (not .Values.externalDatabase.existingSecret) (not (and .Values.vso.enabled .Values.vso.database.enabled)) -}}
{{- $needsSmtpSecret := and .Values.smtp.password (not .Values.smtp.existingSecret) -}}
{{- $needsOidcSecrets := and .Values.oidc.providers (not .Values.oidc.existingSecret) -}}
{{- if or $needsAuthSecret $needsEncryptionSecret $needsInternalApiSecret $needsPostgresSecret $needsDbDsn $needsSmtpSecret $needsOidcSecrets }}
{{- $pgPassword := include "synclet.postgresPassword" . -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "synclet.secretName" . }}
  labels:
    {{- include "synclet.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if $needsAuthSecret }}
  jwt-secret: {{ include "synclet.jwtSecret" . | quote }}
  {{- end }}
  {{- if $needsEncryptionSecret }}
  encryption-key: {{ include "synclet.encryptionKey" . | quote }}
  {{- if .Values.encryption.keyPrevious }}
  encryption-key-previous: {{ .Values.encryption.keyPrevious | quote }}
  {{- end }}
  {{- end }}
  {{- if $needsInternalApiSecret }}
  internal-api-secret: {{ include "synclet.internalApiSecret" . | quote }}
  {{- end }}
  {{- if $needsPostgresSecret }}
  postgres-password: {{ $pgPassword | quote }}
  {{- end }}
  {{- if $needsDbDsn }}
  {{- if .Values.postgresql.enabled }}
  db-dsn: {{ printf "postgres://%s:%s@%s-postgres:5432/%s?sslmode=disable" .Values.postgresql.auth.username ($pgPassword | urlquery) (include "synclet.fullname" .) .Values.postgresql.auth.database | quote }}
  {{- else }}
  db-dsn: {{ printf "postgres://%s:%s@%s:%v/%s?sslmode=%s" .Values.externalDatabase.user (.Values.externalDatabase.password | urlquery) .Values.externalDatabase.host (.Values.externalDatabase.port | default 5432) .Values.externalDatabase.database .Values.externalDatabase.sslmode | quote }}
  {{- end }}
  {{- end }}
  {{- if $needsSmtpSecret }}
  smtp-password: {{ .Values.smtp.password | quote }}
  {{- end }}
  {{- if $needsOidcSecrets }}
  {{- range .Values.oidc.providers }}
  {{- if .clientSecret }}
  oidc-{{ .slug }}-client-secret: {{ .clientSecret | quote }}
  {{- end }}
  {{- end }}
  {{- end }}
{{- end }}
