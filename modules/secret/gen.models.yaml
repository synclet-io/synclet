types:
  models:
    - name: Secret
      table_name: secret.secrets
      fields:
        - { name: ID, type: uuid, filterable: true }
        - { name: EncryptedValue, type: "[]byte" }
        - { name: Salt, type: "[]byte" }
        - { name: Nonce, type: "[]byte" }
        - { name: KeyVersion, type: int }
        - { name: OwnerType, type: string, filterable: true }
        - { name: OwnerID, type: uuid, filterable: true }
        - { name: CreatedAt, type: timestamp }
        - { name: UpdatedAt, type: timestamp }
