syntax = "proto3";

package synclet.publicapi.stats.v1;

option go_package = "github.com/synclet-io/synclet/gen/proto/synclet/publicapi/stats/v1;statsv1";

import "google/protobuf/timestamp.proto";
import "synclet/options/v1/options.proto";

enum TimeRange {
  TIME_RANGE_UNSPECIFIED = 0;
  TIME_RANGE_24H = 1;
  TIME_RANGE_7D = 2;
  TIME_RANGE_30D = 3;
}

enum HealthStatus {
  HEALTH_STATUS_UNSPECIFIED = 0;
  HEALTH_STATUS_HEALTHY = 1;
  HEALTH_STATUS_WARNING = 2;
  HEALTH_STATUS_FAILING = 3;
  HEALTH_STATUS_DISABLED = 4;
}

enum SyncStatus {
  SYNC_STATUS_UNSPECIFIED = 0;
  SYNC_STATUS_COMPLETED = 1;
  SYNC_STATUS_FAILED = 2;
}

enum FailureCategoryType {
  FAILURE_CATEGORY_TYPE_UNSPECIFIED = 0;
  FAILURE_CATEGORY_TYPE_TIMEOUT = 1;
  FAILURE_CATEGORY_TYPE_OOM = 2;
  FAILURE_CATEGORY_TYPE_CONNECTOR = 3;
  FAILURE_CATEGORY_TYPE_INFRASTRUCTURE = 4;
  FAILURE_CATEGORY_TYPE_UNKNOWN = 5;
}

service StatsService {
  rpc GetWorkspaceStats(GetWorkspaceStatsRequest) returns (GetWorkspaceStatsResponse) {
    option (synclet.options.v1.required_role) = REQUIRED_ROLE_VIEWER;
  }
  rpc GetConnectionStats(GetConnectionStatsRequest) returns (GetConnectionStatsResponse) {
    option (synclet.options.v1.required_role) = REQUIRED_ROLE_VIEWER;
  }
  rpc GetSyncTimeline(GetSyncTimelineRequest) returns (GetSyncTimelineResponse) {
    option (synclet.options.v1.required_role) = REQUIRED_ROLE_VIEWER;
  }
}

message GetWorkspaceStatsRequest {
  TimeRange time_range = 1;
}

message GetWorkspaceStatsResponse {
  int64 total_syncs = 1;
  double success_rate = 2;       // 0.0 - 100.0
  int64 records_synced = 3;
  int32 active_connections = 4;
  int64 failed_syncs = 5;
  // Trend deltas (vs previous period)
  double total_syncs_delta = 6;      // percentage change
  double success_rate_delta = 7;
  double records_synced_delta = 8;
  double failed_syncs_delta = 9;
  // Connection health grid
  repeated ConnectionHealth connection_healths = 10;
  // Top connections by volume
  repeated TopConnection top_connections = 11;
  // Failure breakdown aggregated across all connections (D-05)
  repeated FailureCategory failure_breakdown = 12;
}

message ConnectionHealth {
  string connection_id = 1;
  string connection_name = 2;
  HealthStatus health = 3;
  google.protobuf.Timestamp last_sync_at = 4;
}

message TopConnection {
  string connection_id = 1;
  string connection_name = 2;
  int64 records_synced = 3;
  int64 bytes_synced = 4;
  google.protobuf.Timestamp last_sync_at = 5;
  repeated int64 sparkline_values = 6; // last 7 data points
}

message GetConnectionStatsRequest {
  string connection_id = 1;
  TimeRange time_range = 2;
}

message GetConnectionStatsResponse {
  int64 avg_duration_ms = 1;
  double success_rate = 2;
  int64 total_records = 3;
  google.protobuf.Timestamp last_sync_at = 4;
  // Deltas
  double avg_duration_delta = 5;
  double success_rate_delta = 6;
  double total_records_delta = 7;
  HealthStatus health = 8;
  // Charts data
  repeated SyncDurationPoint duration_chart = 9;
  repeated RecordsTimelinePoint records_chart = 10;
  // Failure breakdown
  repeated FailureCategory failure_breakdown = 11;
}

message SyncDurationPoint {
  string label = 1;
  int64 duration_ms = 2;
  SyncStatus status = 3;
}

message RecordsTimelinePoint {
  string label = 1;
  int64 records_read = 2;
}

message FailureCategory {
  FailureCategoryType category = 1;
  int32 count = 2;
}

message GetSyncTimelineRequest {
  TimeRange time_range = 1;
  string connection_id = 2; // optional, empty for workspace-level
}

message GetSyncTimelineResponse {
  repeated TimelinePoint points = 1;
  repeated ThroughputPoint throughput = 2;
  repeated DurationPoint durations = 3;
}

message TimelinePoint {
  string label = 1;
  int32 succeeded = 2;
  int32 failed = 3;
}

message ThroughputPoint {
  string label = 1;
  int64 records_read = 2;
  int64 bytes_synced = 4;
}

message DurationPoint {
  string label = 1;
  int64 avg_duration_ms = 2;
}
