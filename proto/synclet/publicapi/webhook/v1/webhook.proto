syntax = "proto3";

package synclet.publicapi.webhook.v1;

option go_package = "synclet/gen/proto/synclet/publicapi/webhook/v1;webhookv1";

import "google/protobuf/timestamp.proto";
import "synclet/options/v1/options.proto";

// WebhookService manages webhook subscriptions.
// Available events: sync.completed, sync.failed, connection.paused, schema.changed, * (all).
service WebhookService {
  rpc CreateWebhook(CreateWebhookRequest) returns (CreateWebhookResponse) {
    option (synclet.options.v1.required_role) = REQUIRED_ROLE_ADMIN;
  }
  rpc UpdateWebhook(UpdateWebhookRequest) returns (UpdateWebhookResponse) {
    option (synclet.options.v1.required_role) = REQUIRED_ROLE_ADMIN;
  }
  rpc DeleteWebhook(DeleteWebhookRequest) returns (DeleteWebhookResponse) {
    option (synclet.options.v1.required_role) = REQUIRED_ROLE_ADMIN;
  }
  rpc ListWebhooks(ListWebhooksRequest) returns (ListWebhooksResponse) {
    option (synclet.options.v1.required_role) = REQUIRED_ROLE_ADMIN;
  }
}

message WebhookInfo {
  string id = 1;
  string workspace_id = 2;
  string url = 3;
  repeated string events = 4;
  bool enabled = 5;
  google.protobuf.Timestamp created_at = 6;
  google.protobuf.Timestamp updated_at = 7;
}

message CreateWebhookRequest {
  string workspace_id = 1;
  string url = 2;
  repeated string events = 3;
  string secret = 4;
}

message CreateWebhookResponse {
  WebhookInfo webhook = 1;
}

message UpdateWebhookRequest {
  string id = 1;
  optional string url = 2;
  repeated string events = 3;
  optional bool enabled = 4;
}

message UpdateWebhookResponse {
  WebhookInfo webhook = 1;
}

message DeleteWebhookRequest {
  string id = 1;
}

message DeleteWebhookResponse {}

message ListWebhooksRequest {
  string workspace_id = 1;
}

message ListWebhooksResponse {
  repeated WebhookInfo webhooks = 1;
}
