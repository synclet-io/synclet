syntax = "proto3";

package synclet.internalapi.executor.v1;

option go_package = "synclet/gen/proto/synclet/internalapi/executor/v1;executorv1";

import "synclet/protocol/v1/protocol.proto";
import "synclet/publicapi/pipeline/v1/pipeline.proto";

// ConnectorType distinguishes source vs destination in config update reports (D-07).
enum ConnectorType {
  CONNECTOR_TYPE_UNSPECIFIED = 0;
  CONNECTOR_TYPE_SOURCE = 1;
  CONNECTOR_TYPE_DESTINATION = 2;
}

// JobType identifies the type of sync job (D-08).
enum JobType {
  JOB_TYPE_UNSPECIFIED = 0;
  JOB_TYPE_SYNC = 1;
}

// NamespaceDefinition controls how destination namespaces are derived (D-09).
enum NamespaceDefinition {
  NAMESPACE_DEFINITION_UNSPECIFIED = 0;
  NAMESPACE_DEFINITION_SOURCE = 1;
  NAMESPACE_DEFINITION_DESTINATION = 2;
  NAMESPACE_DEFINITION_CUSTOM = 3;
}

service ExecutorService {
  // Existing RPCs (from OrchestratorService, renamed)
  rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse);
  rpc ReportState(ReportStateRequest) returns (ReportStateResponse);
  rpc ReportCompletion(ReportCompletionRequest) returns (ReportCompletionResponse);
  rpc ReportConfigUpdate(ReportConfigUpdateRequest) returns (ReportConfigUpdateResponse);
  rpc ReportLog(ReportLogRequest) returns (ReportLogResponse);

  // New RPCs per D-02/D-03/D-04
  rpc ClaimJob(ClaimJobRequest) returns (ClaimJobResponse);
  rpc UpdateJobStatus(UpdateJobStatusRequest) returns (UpdateJobStatusResponse);
  rpc IsJobActive(IsJobActiveRequest) returns (IsJobActiveResponse);

  // Connector task RPCs per D-15/D-18
  rpc ClaimConnectorTask(ClaimConnectorTaskRequest) returns (ClaimConnectorTaskResponse);
  rpc ReportConnectorTaskResult(ReportConnectorTaskResultRequest) returns (ReportConnectorTaskResultResponse);
}

message HeartbeatRequest {
  string job_id = 1;
  int64 records_read = 2;
  int64 bytes_synced = 4;
}

// HeartbeatResponse carries cancellation signal per D-05.
message HeartbeatResponse {
  bool cancelled = 1;
}

message ReportStateRequest {
  string job_id = 1;
  string connection_id = 2;
  bytes state_data = 3;
  synclet.protocol.v1.StateType state_type = 4;
}

message ReportStateResponse {}

message ReportCompletionRequest {
  string job_id = 1;
  string connection_id = 2;
  bool success = 3;
  string error_message = 4;
  int64 records_read = 5;
  int64 bytes_synced = 7;
  int64 duration_ms = 8;
  int32 source_exit_code = 9;
  int32 dest_exit_code = 10;
}

message ReportCompletionResponse {}

message ReportConfigUpdateRequest {
  string job_id = 1;
  string connection_id = 2;
  ConnectorType connector_type = 3;
  string connector_id = 4;    // UUID of the source or destination
  bytes config = 5;           // New config JSON from CONTROL message
}

message ReportConfigUpdateResponse {}

message ReportLogRequest {
  string job_id = 1;
  repeated string log_lines = 2;
}

message ReportLogResponse {}

// ClaimJob: executor requests a job to run (D-02)
message ClaimJobRequest {
  string worker_id = 1;
}

// ClaimJobResponse: full bundle so executor has everything in one RPC call (D-02)
message ClaimJobResponse {
  bool has_job = 1;
  string job_id = 2;
  string connection_id = 3;
  JobType job_type = 4;
  string source_id = 5;
  string destination_id = 6;
  string source_image = 7;
  bytes source_config = 8;
  string dest_image = 9;
  bytes dest_config = 10;
  bytes configured_catalog = 11;
  bytes state_blob = 12;
  string runtime_config = 13;
  string workspace_id = 14;
  NamespaceDefinition namespace_definition = 15;
  string custom_namespace_format = 16;
  string stream_prefix = 17;
  int32 max_attempts = 18;
  string source_runtime_config = 19;
  string dest_runtime_config = 20;
}

// UpdateJobStatus: executor reports job completion/failure (D-03)
message UpdateJobStatusRequest {
  string job_id = 1;
  bool success = 2;
  string error_message = 3;
  int64 records_read = 4;
  int64 bytes_synced = 5;
  int64 duration_ms = 6;
}

message UpdateJobStatusResponse {}

// IsJobActive: orphan checker queries whether a job is still active (D-04)
message IsJobActiveRequest {
  string job_id = 1;
}

message IsJobActiveResponse {
  bool active = 1;
}

// ClaimConnectorTask: executor requests a connector task to run (D-15)
message ClaimConnectorTaskRequest {
    string worker_id = 1;
}

message ClaimConnectorTaskResponse {
    bool has_task = 1;
    string task_id = 2;
    synclet.publicapi.pipeline.v1.ConnectorTaskType task_type = 3;
    string image = 4;
    bytes config = 5;
    string workspace_id = 6;
}

// ReportConnectorTaskResult: executor reports task completion (D-18)
message ReportConnectorTaskResultRequest {
    string task_id = 1;
    bool success = 2;
    string error_message = 3;
    bytes result = 4;
}

message ReportConnectorTaskResultResponse {}
